<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ramadan Greeting Card</title>
  <style>
    @font-face {
      font-family: 'Neo Sans W23';
      src: url('Fonts/Neo-Sans-W23-m.ttf') format('truetype');
      font-weight: 400;
      font-style: normal;
    }

    body {
      text-align: center;
      font-family: 'Neo Sans W23', sans-serif;
      background-color: #f8f8f8;
      position: relative;
      min-height: 100vh;
      padding: 20px;
      perspective: 1500px;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image: url("Manga BG.png");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      opacity: 0.10;
      z-index: -1;
      pointer-events: none;
    }
    .canvas-card {
      display: inline-block;
      position: relative;
      border-radius: 20px;
      margin-top: 30px;
      margin-bottom: 20px;
      transition-duration: 300ms;
      transition-property: transform, box-shadow;
      transition-timing-function: ease-out;
      transform: rotate3d(0, 0, 0, 0deg);
      transform-style: preserve-3d;
      box-shadow: 0 2px 10px #00000024;
    }
    .canvas-card:hover {
      transition-duration: 150ms;
      box-shadow: 0 8px 24px #00000033;
    }
    .canvas-card .glow {
      position: absolute;
      inset: 0;
      border-radius: 25px;
      pointer-events: none;
      background-image: radial-gradient(circle at 50% -20%, #ffffff22, #0000000f);
    }
    canvas {
      border: 2px solid #664493;
      outline: 2px solid #664493;
      outline-offset: 0;
      border-radius: 20px;
      display: block;
      max-width: 100%;
    }
    input {
      font-size: 18px;
      padding: 10px;
      margin-bottom: 10px;
      width: 300px;
    }
    button {
      padding: 10px 20px;
      font-size: 18px;
      background-color: #664493;
      color: #ffd19d;
      border: none;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border-radius: 8px;
    }
    .download-icon {
      width: 20px;
      height: 20px;
      display: inline-block;
    }
    .manga-logo {
      display: none;
      width: 220px;
      max-width: 60%;
      margin-bottom: 14px;
    }
    @media (orientation: portrait), (max-width: 768px) {
      .manga-logo {
        display: block;
        margin-left: auto;
        margin-right: auto;
      }
    }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700&display=swap" rel="stylesheet">
</head>
<body>

  <img src="Manga logo.svg" alt="Manga Logo" class="manga-logo">
  <div class="canvas-card" id="canvasCard">
    <canvas id="cardCanvas" width="1000" height="688"></canvas>
    <div class="glow" aria-hidden="true"></div>
  </div><br>
  <input type="text" id="nameInput" placeholder="اكتب اسمك هنا (Enter your name)" oninput="updateCard()" dir="rtl">
  <br>
  <button onclick="downloadCard()">
    <svg class="download-icon" viewBox="0 0 24 24" aria-hidden="true">
      <path d="M12 4V14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      <path d="M8 10L12 14L16 10" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M5 18H19" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    </svg>
    <span>Download Card</span>
  </button>

  <script>
    const canvas = document.getElementById("cardCanvas");
    const canvasCard = document.getElementById("canvasCard");
    const glowLayer = canvasCard.querySelector(".glow");
    const ctx = canvas.getContext("2d");
    const img = new Image();
    let bounds;

    function rotateToMouse(e) {
      const mouseX = e.clientX;
      const mouseY = e.clientY;
      const leftX = mouseX - bounds.x;
      const topY = mouseY - bounds.y;
      const center = {
        x: leftX - bounds.width / 2,
        y: topY - bounds.height / 2
      };
      const distance = Math.sqrt(center.x ** 2 + center.y ** 2);

      canvasCard.style.transform = `
        scale3d(1.03, 1.03, 1.03)
        rotate3d(
          ${center.y / 100},
          ${-center.x / 100},
          0,
          ${Math.log(distance + 1) * 2}deg
        )
      `;

      glowLayer.style.backgroundImage = `
        radial-gradient(
          circle at
          ${center.x * 2 + bounds.width / 2}px
          ${center.y * 2 + bounds.height / 2}px,
          #ffffff66,
          #00000010
        )
      `;
    }

    if (window.matchMedia("(hover: hover) and (pointer: fine)").matches) {
      canvasCard.addEventListener("mouseenter", () => {
        bounds = canvasCard.getBoundingClientRect();
        document.addEventListener("mousemove", rotateToMouse);
      });

      canvasCard.addEventListener("mouseleave", () => {
        document.removeEventListener("mousemove", rotateToMouse);
        canvasCard.style.transform = "";
        glowLayer.style.backgroundImage = "";
      });
    }
    
    // Add error handling for image loading
    img.onerror = function() {
      console.error("Error loading image");
      alert("Error loading the greeting card image. Please make sure 'Eid 2026 BG.jpg' is in the same directory.");
    };
    
    img.src = "Eid 2026 BG.jpg"; // Your card image path

    img.onload = () => {
      drawCard();
    };

    function drawCard(name = "") {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

      // Darken the lower text area so the name stays readable on bright backgrounds.
      const gradientHeight = 240;
      const textAreaGradient = ctx.createLinearGradient(
        0,
        canvas.height - gradientHeight,
        0,
        canvas.height
      );
      textAreaGradient.addColorStop(0, "rgba(0, 0, 0, 0)");
      textAreaGradient.addColorStop(1, "rgba(0, 0, 0, 0.35)");
      ctx.fillStyle = textAreaGradient;
      ctx.fillRect(0, canvas.height - gradientHeight, canvas.width, gradientHeight);
      
      if (name) {
        const fontSize = 37.5;
        ctx.font = `400 ${fontSize}px 'Neo Sans W23', sans-serif`;
        ctx.textAlign = "center";
        ctx.direction = "rtl"; // Ensures right-to-left text for Arabic

        // Define the target Y position for the text baseline
        // This is where the actual text will be drawn.
        // Adjust this value (e.g., canvas.height - 120, canvas.height - 150)
        // to move the text up or down on the card.
        const textBaselineY = canvas.height - 70; 

        // Draw the text
        ctx.fillStyle = "#fffff2";
        ctx.fillText(name, canvas.width / 2, textBaselineY);
      }
    }

    function updateCard() {
      const name = document.getElementById("nameInput").value;
      drawCard(name);
    }

    function downloadCard() {
      let dataUrl;
      try {
        dataUrl = canvas.toDataURL("image/png");
      } catch (error) {
        console.error("Canvas export failed:", error);
        alert("Could not export the card image. If you're opening this file directly, try running it from a local server (not file://).");
        return;
      }
      
      // Check if device is likely mobile
      const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
      
      if (isMobile) {
        // For mobile devices - open image in new tab for saving to gallery
        const newTab = window.open();
        if (newTab) {
          newTab.document.write('<img src="' + dataUrl + '" alt="Ramadan Greeting Card" style="max-width:100%">');
          newTab.document.write('<p style="font-weight: 400; font-size: 20px; font-family: \'Neo Sans W23\', sans-serif;">Press and hold on the image to save to your photo gallery</p>');
          newTab.document.title = "Save your Ramadan card";
        } else {
          alert("Please enable pop-ups to save your card or take a screenshot");
        }
      } else {
        // For desktop - normal download
        const link = document.createElement("a");
        link.download = "ramadan_greeting.png";
        link.href = dataUrl;

        if (typeof link.download === "string") {
          document.body.appendChild(link);
          link.click();
          link.remove();
        } else {
          window.open(dataUrl, "_blank");
        }
      }
    }
  </script>

</body>
</html>
